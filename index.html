<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Photo Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 24px; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 20px; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .thumb {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      background: #ddd;
    }
    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }
    .thumb:hover img { transform: scale(1.05); }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 6px;
      object-fit: contain;
    }
    #lb-close {
      position: fixed; top: 16px; right: 20px;
      color: #fff; font-size: 32px; cursor: pointer;
      font-weight: 300; line-height: 1;
    }
    #lb-prev, #lb-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      font-size: 28px; width: 48px; height: 48px;
      border-radius: 50%; cursor: pointer;
    }
    #lb-prev:hover, #lb-next:hover { background: rgba(255,255,255,0.3); }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
    #lb-caption {
      position: fixed; bottom: 16px; width: 100%;
      text-align: center; color: rgba(255,255,255,0.7);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>My Gallery</h1>
  <div class="gallery" id="gallery"></div>

  <div id="lightbox">
    <span id="lb-close">✕</span>
    <button id="lb-prev">‹</button>
    <img id="lb-img" src="" alt="">
    <button id="lb-next">›</button>
    <span id="lb-caption"></span>
  </div>

  <script>
    // ✏️ UPDATE THIS LIST with your actual image filenames
    const images = [

"vid 1.mp4",



      // add more...
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCaption = document.getElementById('lb-caption');
    let current = 0;

    images.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${src}" alt="${src}" loading="lazy">`;
      div.onclick = () => openLightbox(i);
      gallery.appendChild(div);
    });

    function openLightbox(i) {
      current = i;
      lbImg.src = images[i];
      lbCaption.textContent = images[i];
      lightbox.classList.add('active');
    }

    document.getElementById('lb-close').onclick = () => lightbox.classList.remove('active');
    document.getElementById('lb-prev').onclick = () => openLightbox((current - 1 + images.length) % images.length);
    document.getElementById('lb-next').onclick = () => openLightbox((current + 1) % images.length);
    lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('active'); };
    document.onkeydown = (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') lightbox.classList.remove('active');
      if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    };
  </script>
</body>
</html>
